<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
<link rel="stylesheet" href="style.css">
<title>Tug Of War Learning Game</title>


</head>

<body>

<!-- LOADING -->

<div id="loadingScreen" class="loading">

<h1>🎯 Tug Of War Learning Game</h1>

<button id="startGameBtn" disabled>Loading Music...</button>

<div class="volumeBox">
<label>🎵 Music Volume</label><br>
<input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.5">
</div>

</div>

<h1>🎯 Tug Of War Learning Game</h1>

<!-- AUDIO -->

<audio id="bgMusic" loop preload="auto">
<source src="music.mp3">
</audio>

<audio id="correctSound">
<source src="correct.mp3">
</audio>

<audio id="wrongSound">
<source src="wrong.mp3">
</audio>

<audio id="victorySound">
<source src="victory.wav">
</audio>

<!-- GAME -->

<div class="game">



<div class="tug-area">

<div class="center-line"></div>

<div class="tug-container">
<img src="tug.png" id="tugImage" class="idle">
</div>

</div>

<div class="game-controller">
    <div class="player">
            <h2>Player 1</h2>
            <div class="shapes" id="shape1"></div>
            <div class="question" id="q1"></div>
            <div class="answer-container" id="answers1"></div>
    </div>

    <div class="player">
        <h2>Player 2</h2>
        <div class="shapes" id="shape2"></div>
        <div class="question" id="q2"></div>
        <div class="answer-container" id="answers2"></div>
    </div>
</div>

</div>

<!-- WIN SCREEN -->

<div class="dialog" id="dialog">

<div class="trophy">🏆</div>

<h2 id="winnerText"></h2>

<button class="play-btn" onclick="restartGame()">Play Again</button>

</div>

<canvas id="fireworks"></canvas>

<script>

const shapes=["triangle","square","rectangle","circle","diamond","oval","star"]
const colors=["red","blue","green","orange","purple","pink"]

let correct1
let correct2

let gamePosition=0
let position=0
const step=30

const tug=document.getElementById("tugImage")

/* MUSIC */

const bgMusic=document.getElementById("bgMusic")
const startBtn=document.getElementById("startGameBtn")
const volumeSlider=document.getElementById("volumeSlider")

bgMusic.volume=0.5

volumeSlider.oninput=()=>bgMusic.volume=volumeSlider.value

bgMusic.addEventListener("canplaythrough",()=>{
startBtn.disabled=false
startBtn.innerText="Start Game"
})

startBtn.onclick=()=>{

bgMusic.play()

document.documentElement.requestFullscreen()

document.getElementById("loadingScreen").style.display="none"

}

/* QUESTIONS */

function newQuestion(player){

let shape=randomShape()
let color=randomColor()
let mode=Math.random()<0.5?"color":"shape"

if(player===1){

shape1.innerHTML=""

if(mode==="color"){
correct1=color
q1.innerText="What is the color of the "+shape+"?"
showShape("shape1",shape,color)
createColorAnswers("answers1",color,1)
}else{
correct1=shape
q1.innerText="What shape is this?"
showShape("shape1",shape,color)
createShapeAnswers("answers1",shape,1)
}

}else{

shape2.innerHTML=""

if(mode==="color"){
correct2=color
q2.innerText="What is the color of the "+shape+"?"
showShape("shape2",shape,color)
createColorAnswers("answers2",color,2)
}else{
correct2=shape
q2.innerText="What shape is this?"
showShape("shape2",shape,color)
createShapeAnswers("answers2",shape,2)
}

}

}

function randomShape(){return shapes[Math.floor(Math.random()*shapes.length)]}
function randomColor(){return colors[Math.floor(Math.random()*colors.length)]}

/* DRAW SHAPE */

function showShape(container,shape,color){

let div=document.createElement("div")

if(shape==="star"){
div.innerHTML='<i class="fa-solid fa-star"></i>'
div.className="star"
div.style.color=color
}
else if(shape==="triangle"){
div.className="triangle"
div.style.borderBottom="70px solid "+color
}
else{
div.className=shape
div.style.background=color
}

document.getElementById(container).appendChild(div)

}

/* ANSWERS */

function createColorAnswers(container,correct,player){

let box=document.getElementById(container)
box.innerHTML=""

let options=[correct]

while(options.length<4){
let c=randomColor()
if(!options.includes(c)) options.push(c)
}

options.sort(()=>Math.random()-0.5)

options.forEach(opt=>{
let btn=document.createElement("div")
btn.className="answer"
btn.innerText=opt
btn.onclick=()=>checkAnswer(btn,opt,player)
box.appendChild(btn)
})

}

function createShapeAnswers(container,correct,player){

let box=document.getElementById(container)
box.innerHTML=""

let options=[correct]

while(options.length<4){
let s=randomShape()
if(!options.includes(s)) options.push(s)
}

options.sort(()=>Math.random()-0.5)

options.forEach(opt=>{
let btn=document.createElement("div")
btn.className="answer"
btn.innerText=opt
btn.onclick=()=>checkAnswer(btn,opt,player)
box.appendChild(btn)
})

}

/* ANSWER */

function checkAnswer(btn,choice,player){

let correct = player===1 ? correct1 : correct2

if(choice===correct){

btn.classList.add("correct")
correctSound.play()

pull(player)

setTimeout(()=>newQuestion(player),800)

}else{

btn.classList.add("wrong")
wrongSound.play()

if(player===1){pull(2)}else{pull(1)}

}

checkWinner()

}

/* ROPE */

function pull(player){

tug.classList.remove("idle")

if(player===1){
tug.classList.add("pull-left")
position-=step
gamePosition++
}else{
tug.classList.add("pull-right")
position+=step
gamePosition--
}

tug.style.left=position+"px"

setTimeout(()=>{
tug.classList.remove("pull-left","pull-right")
tug.classList.add("idle")
},400)

}

/* WIN */

function checkWinner(){

if(gamePosition>=4){
showWinner("Player 1 Wins!")
}

if(gamePosition<=-4){
showWinner("Player 2 Wins!")
}

}

function showWinner(text){

bgMusic.pause()

victorySound.play()

winnerText.innerText=text

dialog.style.display="flex"

startFireworks()

}

/* FIREWORKS */

const canvas=document.getElementById("fireworks")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

function startFireworks(){

canvas.style.display="block"

setInterval(()=>{

let x=Math.random()*canvas.width
let y=Math.random()*canvas.height/2

for(let i=0;i<40;i++){

particles.push({
x:x,
y:y,
vx:(Math.random()-0.5)*6,
vy:(Math.random()-0.5)*6,
life:60,
color:`hsl(${Math.random()*360},100%,50%)`
})

}

},500)

animateFireworks()

}

function animateFireworks(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach((p,i)=>{

p.x+=p.vx
p.y+=p.vy
p.life--

ctx.fillStyle=p.color
ctx.beginPath()
ctx.arc(p.x,p.y,3,0,Math.PI*2)
ctx.fill()

if(p.life<=0) particles.splice(i,1)

})

requestAnimationFrame(animateFireworks)

}

function restartGame(){
location.reload()
}

newQuestion(1)
newQuestion(2)

</script>

</body>
</html>
